# Add a scrape job when the FastAPI backend runs in Compose, e.g.:
#   - job_name: fastapi
#     metrics_path: /metrics
#     static_configs:
#       - targets: ['backend:8000']

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
